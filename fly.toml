# fly.toml — AltClinic Backend
# Documentação: https://fly.io/docs/reference/configuration/

app = "altclinic-api"
primary_region = "gru"  # São Paulo, Brasil

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV    = "production"
  PORT        = "8080"
  TZ          = "America/Sao_Paulo"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period  = "30s"
    interval      = "30s"
    method        = "GET"
    path          = "/health"
    port          = 8080
    timeout       = "10s"
    type          = "http"
