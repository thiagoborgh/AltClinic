version: '3.8'

services:
  # Evolution API - WhatsApp Business API
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-Altclinic123456}
      - DATABASE_URL=sqlite:///./evolution.db
      - DATABASE_ENABLED=true
      - LOG_LEVEL=DEBUG
      - CORS_ORIGIN=*
    volumes:
      - evolution-data:/evolution/data
      - evolution-logs:/evolution/logs
    restart: unless-stopped
    networks:
      - evolution-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Aplicação AltClinic (opcional para testes integrados)
  altclinic-app:
    build: .
    container_name: altclinic-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_PATH=/app/saee.db
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-Altclinic123456}
      - TEST_PHONE_NUMBER=${TEST_PHONE_NUMBER:-5511942180081}
    volumes:
      - .:/app
      - /app/node_modules
      - altclinic-data:/app/data
      - altclinic-uploads:/app/uploads
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - evolution-network
    depends_on:
      - evolution-api
    healthcheck:
      test: ["CMD", "node", "health-check.js"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  evolution-data:
  evolution-logs:
  altclinic-data:
  altclinic-uploads:

networks:
  evolution-network:
    driver: bridge