version: '3.8'

services:
  # Aplicação principal
  altclinic-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/saee.db
      - UPLOAD_PATH=/app/uploads
    volumes:
      - altclinic-data:/app/data
      - altclinic-uploads:/app/uploads
      - altclinic-logs:/app/logs
      - altclinic-whatsapp:/app/whatsapp-session
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - altclinic-network
    depends_on:
      - altclinic-db
    healthcheck:
      test: ["CMD", "node", "health-check.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Banco de dados PostgreSQL (opcional para produção)
  altclinic-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=altclinic
      - POSTGRES_USER=altclinic
      - POSTGRES_PASSWORD=sua_senha_segura_aqui
    volumes:
      - altclinic-postgres:/var/lib/postgresql/data
    networks:
      - altclinic-network
    restart: unless-stopped

  # Redis para cache (opcional)
  altclinic-redis:
    image: redis:7-alpine
    networks:
      - altclinic-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - altclinic-redis:/data

  # Nginx como proxy reverso
  altclinic-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - altclinic-network
    depends_on:
      - altclinic-app
    restart: unless-stopped

volumes:
  altclinic-data:
    driver: local
  altclinic-uploads:
    driver: local
  altclinic-logs:
    driver: local
  altclinic-whatsapp:
    driver: local
  altclinic-postgres:
    driver: local
  altclinic-redis:
    driver: local

networks:
  altclinic-network:
    driver: bridge
